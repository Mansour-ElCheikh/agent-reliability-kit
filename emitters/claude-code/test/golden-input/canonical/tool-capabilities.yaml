# Minimal tool-capabilities fixture for the Claude Code emitter self-test.
# Only the fields the emitter reads.

schema_version: 1

claude-code:
  tier: 1
  as_of: "2026-05-18"
  hook_intercept:
    supports: true
    mechanism: PreToolUse
  subagent_invocation:
    supports: true
    location: .claude/agents/<name>.md
  session_lifecycle_hooks:
    supports: true
    events: [SessionStart, SessionEnd]
  llm_inline_invocation:
    supports: true
    format: "/<skill-name> via SKILL.md description triggers"
  skill_format:
    path: ".claude/skills/<name>/SKILL.md"
  agent_format:
    path: ".claude/agents/<name>.md"
